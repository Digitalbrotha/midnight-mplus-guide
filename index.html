        }

        header p {
            color: #b0b0b0;
            font-size: 1.1em;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            border: 1px solid rgba(255,193,7,0.3);
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        label {
            color: #ffc107;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 0.9em;
        }

        select {
            padding: 12px;
            background: #0f3460;
            color: #e0e0e0;
            border: 2px solid #ffc107;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:hover,
        select:focus {
            background: #1a4d7a;
            box-shadow: 0 0 10px rgba(255,193,7,0.5);
            outline: none;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .reset-btn {
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .reset-btn:hover {
            background: #c0392b;
        }

        .content {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .boss-card {
            background: linear-gradient(135deg, #0f3460 0%, #1a4d7a 100%);
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .boss-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(255,193,7,0.3);
            border-color: #ff6b6b;
        }

        .dungeon-badge {
            display: inline-block;
            background: #ffc107;
            color: #0f3460;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8em;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .boss-name {
            font-size: 1.8em;
            color: #ffc107;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .difficulty {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 0.9em;

        .difficulty.high {
            background: #e74c3c;

        }

        .difficulty.medium {
            background: #f39c12;
            color: white;
        }

        .difficulty.low {
            background: #27ae60;
            color: white;
        }

        .mechanic {

            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-left: 4px solid #ffc107;
            border-radius: 5px;
        }

        .mechanic-name {
            color: #ffc107;
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 8px;
        }

        .mechanic-description {
            color: #d0d0d0;
            margin-bottom: 10px;
        }

        .ranged-tip {

            border: 1px solid #4caf f5;
            padding: 10px;
            border-radius: 5px;
            color: #4caff5;
            font-size: 0.95em;
            margin-top: 10px;
        }

        .ranged-tip::before {
            content: "🎯 ";
            font-weight: bold;
        }

        .visual-element {
            margin: 15px 0;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
            text-align: center;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state h2 {
            font-size: 1.5em;

        .mechanic-icon {

            margin-bottom: 10px;
        }

        .stats-bar {

            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stat {

            background: rgba(255,193,7,0.1);
            border: 1px solid #ffc107;
            border-radius: 5px;
            text-align: center;
            font-size: 0.9em;
        }

            font-size: 0.8em;

            color: #ffc107;
            font-weight: bold;

        function renderCards(filterDungeon = "", filterDifficulty = "", searchTerm = "") {
            const content = document.getElementById('content');
            const statsSection = document.getElementById('statsSection');
            
            const filtered = dungeonData.filter(boss => {
                const matchDungeon = filterDungeon === "" || boss.dungeon === filterDungeon;
                const matchDifficulty = filterDifficulty === "" || boss.difficulty === filterDifficulty;
                const matchSearch = searchTerm === "" || boss.boss.toLowerCase().includes(searchTerm.toLowerCase());
                return matchDungeon && matchDifficulty && matchSearch;
            });

            if (filtered.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <h2>No bosses found</h2>
                        <p>Try adjusting your filters</p>
                    </div>
                `;
                statsSection.style.display = 'none';
                return;
            }

            // Calculate stats
            const highCount = filtered.filter(b => b.difficulty === 'high').length;
            const mediumCount = filtered.filter(b => b.difficulty === 'medium').length;
            const lowCount = filtered.filter(b => b.difficulty === 'low').length;
            const totalMechanics = filtered.reduce((sum, b) => sum + b.mechanics.length, 0);

            document.getElementById('totalBosses').textContent = filtered.length;
            document.getElementById('highCount').textContent = highCount;
            document.getElementById('mediumCount').textContent = mediumCount;
            document.getElementById('lowCount').textContent = lowCount;
            document.getElementById('totalMechanics').textContent = totalMechanics;
            statsSection.style.display = 'block';

            const cards = filtered.map(boss => `
                <div class="boss-card">
                    <div class="dungeon-badge">${boss.dungeon}</div>
                    <div class="boss-name">${boss.boss}</div>
                    <div class="difficulty ${boss.difficulty}">${boss.difficulty.toUpperCase()} DIFFICULTY</div>
                    ${boss.mechanics.map(mech => `
                        <div class="mechanic">
                            <div class="mechanic-name">⚡ ${mech.name}</div>
                            <div class="mechanic-description">${mech.description}</div>
                            <div class="ranged-tip">${mech.rangedTip}</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');

            content.innerHTML = cards;
        }

        function resetFilters() {
            document.getElementById('dungeonFilter').value = '';
            document.getElementById('difficultyFilter').value = '';
            document.getElementById('searchBox').value = '';
            renderCards();
        }

        // Event listeners
        document.getElementById('dungeonFilter').addEventListener('change', () => {
            const dungeon = document.getElementById('dungeonFilter').value;
            const difficulty = document.getElementById('difficultyFilter').value;
            const search = document.getElementById('searchBox').value;
            renderCards(dungeon, difficulty, search);
        });

        document.getElementById('difficultyFilter').addEventListener('change', () => {
            const dungeon = document.getElementById('dungeonFilter').value;
            const difficulty = document.getElementById('difficultyFilter').value;
            const search = document.getElementById('searchBox').value;
            renderCards(dungeon, difficulty, search);
        });

        document.getElementById('searchBox').addEventListener('input', (e) => {
            const dungeon = document.getElementById('dungeonFilter').value;
            const difficulty = document.getElementById('difficultyFilter').value;
            renderCards(dungeon, difficulty, e.target.value);
        });

        // Initial render
        renderCards();
    </script>
</body>
</html>
